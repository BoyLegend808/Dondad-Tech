<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Pajay Gadgets</title>
    <link rel="stylesheet" href="../style.css?v=2">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../script.js?v=5"></script>
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="../index/index.html" class="logo">Pajay Gadgets</a>
            <ul class="nav-links">
                <li><a href="../index/index.html">Home</a></li>
                <li><a href="../shop/shop.html">Shop</a></li>
            </ul>
        </nav>
    </header>

    <main class="checkout-page">
        <div class="checkout-grid">
            <div class="checkout-form">
                <h1>Checkout</h1>
                
                <form id="checkout-form">
                    <div class="form-section">
                        <h2>Contact Information</h2>
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="name" required placeholder="Enter your full name">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="email" required placeholder="Enter your email">
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" id="phone" required placeholder="Enter your phone number">
                        </div>
                    </div>

                    <div class="form-section">
                        <h2>Shipping Address</h2>
                        <div class="form-group">
                            <label>Address</label>
                            <input type="text" id="address" required placeholder="Enter your address">
                        </div>
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" id="city" required placeholder="Enter city">
                        </div>
                        <div class="form-group">
                            <label>State</label>
                            <input type="text" id="state" required placeholder="Enter state">
                        </div>
                    </div>

                    <div class="form-section">
                        <h2>Payment Method</h2>
                        <div class="payment-options">
                            <label class="payment-option">
                                <input type="radio" name="payment" value="delivery" checked>
                                <span>Pay on Delivery</span>
                            </label>
                            <label class="payment-option">
                                <input type="radio" name="payment" value="transfer">
                                <span>Bank Transfer</span>
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        <i class="fas fa-lock"></i> Place Order
                    </button>
                </form>
            </div>

            <div class="cart-summary">
                <h2>Order Summary</h2>
                <div id="checkout-items"></div>
                <div class="cart-summary-row">
                    <span>Subtotal</span>
                    <span id="checkout-subtotal">₦0</span>
                </div>
                <div class="cart-summary-row">
                    <span>Shipping</span>
                    <span>₦0</span>
                </div>
                <div class="cart-summary-row cart-summary-total">
                    <span>Total</span>
                    <span id="checkout-total">₦0</span>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="../contact/contact.html">Contact</a>
            <a href="../privacy/privacy.html">Privacy Policy</a>
            <a href="../terms/terms.html">Terms</a>
            <a href="../returns/returns.html">Returns</a>
        </div>
        <p>&copy; 2024 Pajay Gadgets. All rights reserved.</p>
    </footer>

    <script>
        function getCurrentUser() {
            try {
                const sessionUser = JSON.parse(sessionStorage.getItem('dondad_currentUser') || 'null');
                if (sessionUser) return sessionUser;
                return JSON.parse(localStorage.getItem('dondad_currentUser') || 'null');
            } catch {
                return null;
            }
        }

        // Check auth
        const user = getCurrentUser();
        if (!user) {
            window.location.href = '../auth/login.html?redirect=../checkout/checkout.html';
        }

        // Pre-fill user info
        if (user) {
            document.getElementById('name').value = user.name || '';
            document.getElementById('email').value = user.email || '';
            document.getElementById('phone').value = user.phone || '';
        }

        // Load cart items
        async function loadCheckoutItems() {
            const cart = user ? await fetch('/api/cart/' + (user._id || user.id), { credentials: 'include' }).then(r => r.json()).catch(() => []) : JSON.parse(localStorage.getItem('cart') || '[]');
            
            if (!cart || cart.length === 0) {
                window.location.href = '../cart/cart.html';
                return;
            }

            try {
                const response = await fetch('/api/products');
                const data = await response.json();
                const products = data.products || data;

                const cartWithProducts = cart.map(item => {
                    const product = products.find(p => p._id === item.productId || p._id === item._id);
                    return { ...item, product };
                }).filter(item => item.product);

                renderCheckoutItems(cartWithProducts);
            } catch (error) {
                console.error('Error loading checkout:', error);
            }
        }

        function renderCheckoutItems(items) {
            const container = document.getElementById('checkout-items');
            let subtotal = 0;

            container.innerHTML = items.map(item => {
                const product = item.product;
                const price = product.price || 0;
                const qty = item.qty || 1;
                const itemTotal = price * qty;
                subtotal += itemTotal;

                return `
                    <div class="checkout-item">
                        <img src="${product.image}" alt="${product.name}" onerror="this.src='../../logo.png'">
                        <div>
                            <h4>${product.name}</h4>
                            <p>Qty: ${qty} × ₦${price.toLocaleString()}</p>
                        </div>
                        <span>₦${itemTotal.toLocaleString()}</span>
                    </div>
                `;
            }).join('');

            document.getElementById('checkout-subtotal').textContent = '₦' + subtotal.toLocaleString();
            document.getElementById('checkout-total').textContent = '₦' + subtotal.toLocaleString();
        }

        // Handle checkout
        document.getElementById('checkout-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const orderData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                state: document.getElementById('state').value,
                paymentMethod: document.querySelector('input[name="payment"]:checked').value,
                userId: user._id || user.id
            };

            try {
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(orderData)
                });

                const data = await response.json();

                if (data.success) {
                    // Clear cart
                    if (user) {
                        await fetch('/api/cart/' + (user._id || user.id), {
                            method: 'DELETE',
                            credentials: 'include'
                        });
                    }
                    localStorage.removeItem('cart');

                    alert('Order placed successfully! Order ID: ' + data.orderId);
                    window.location.href = '../order-tracking/order-tracking.html';
                } else {
                    alert(data.error || 'Failed to place order');
                }
            } catch (error) {
                console.error('Checkout error:', error);
                alert('Error placing order. Please try again.');
            }
        });

        document.addEventListener('DOMContentLoaded', loadCheckoutItems);
    </script>
</body>
</html>
