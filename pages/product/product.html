<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product - Pajay Gadgets</title>
    <meta name="description" content="View product details, pricing, variants, and add to cart at Pajay Gadgets.">
    <meta property="og:title" content="Product - Pajay Gadgets">
    <meta property="og:description" content="Discover product features and order with confidence.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="../../logo.png">
    <link rel="canonical" href="product.html">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="./product.css">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>

<body>
    <header>
        <nav class="navbar">
            <a href="../index/index.html" class="logo">Pajay Gadgets</a>
            <ul class="nav-links">
                <li><a href="../index/index.html">Home</a></li>
                <li><a href="../shop/shop.html" class="active">Shop</a></li>
                <li><a href="../index/index.html#about">About</a></li>
                <li><a href="../contact/contact.html">Contact</a></li>
                <li id="admin-nav-link" style="display:none;"><a href="../admin/admin.html">Admin</a></li>
            </ul>
            <div class="nav-right">
                <div class="auth-links" id="auth-links">
                    <a href="../auth/login.html" class="auth-link">Login</a>
                    <a href="../auth/register.html" class="auth-link">Register</a>
                </div>
                <div id="user-menu" style="display:none;">
                    <div class="user-menu" onclick="toggleUserMenu(event)">
                        <div class="user-avatar" id="user-avatar"></div>
                        <div class="user-info">
                            <span class="user-greeting">Welcome back</span>
                            <span class="user-name" id="user-name"></span>
                        </div>
                        <div class="user-dropdown">
                            <a href="../cart/cart.html"><span class="dropdown-icon">🛒</span> My Cart</a>
                            <a href="#" onclick="logoutUser(); return false;" class="logout-btn"><span
                                    class="dropdown-icon">🚪</span> Logout</a>
                        </div>
                    </div>
                </div>
                <a href="../cart/cart.html" class="cart-link" id="cart-link" style="display:none;">
                    <span>Cart</span>
                    <span class="cart-count">(<span id="cart-count">0</span>)</span>
                </a>
                <button class="hamburger" aria-label="Toggle menu" onclick="toggleMenu(event)">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </nav>
    </header>

    <main>
        <section class="product-page">
            <div class="product-nav-actions">
                <a href="../shop/shop.html" class="btn back-to-shop-btn" onclick="return handleBackToShop(event)">← Back to
                    Shop</a>
            </div>

            <!-- Product Detail Section -->
            <div class="product-container" id="product-container">
                <!-- Loading State -->
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading product...</p>
                </div>
            </div>

            <!-- Related Products -->
            <section class="related-products">
                <h2>Related Products</h2>
                <div class="related-grid" id="related-grid">
                    <!-- Populated by JavaScript -->
                </div>
            </section>
        </section>
    </main>

    <footer>
        <div class="footer-links">
            <a href="../contact/contact.html">Contact</a>
            <a href="../privacy/privacy.html">Privacy Policy</a>
            <a href="../terms/terms.html">Terms</a>
            <a href="../returns/returns.html">Returns</a>
        </div>
        <p>&copy; 2024 Pajay Gadgets. All rights reserved.</p>
    </footer>

    <script src="../../products.js"></script>
    <script src="../../script.js"></script>
    <script>
        function getCurrentUser() {
            try {
                const sessionUser = JSON.parse(sessionStorage.getItem('dondad_currentUser') || 'null');
                if (sessionUser) return sessionUser;
                return JSON.parse(localStorage.getItem('dondad_currentUser') || 'null');
            } catch {
                return null;
            }
        }

        // Check if user is logged in and update UI
        document.addEventListener('DOMContentLoaded', function () {
            const currentUser = getCurrentUser();
            const adminLink = document.getElementById('admin-nav-link');
            const authLinks = document.getElementById('auth-links');
            const userMenu = document.getElementById('user-menu');
            const userName = document.getElementById('user-name');
            const userAvatar = document.getElementById('user-avatar');

            if (currentUser) {
                authLinks.style.display = 'none';
                userMenu.style.display = 'flex';

                // Get initials for avatar
                const initials = currentUser.name.split(' ').map(n => n[0]).join('').substring(0, 2);
                userAvatar.textContent = initials || currentUser.name.charAt(0);
                userName.textContent = currentUser.name;

                document.getElementById('cart-link').style.display = 'flex';

                // Show admin link only for admin users
                if (currentUser.role === 'admin' && adminLink) {
                    adminLink.style.display = 'block';
                }
            } else {
                if (adminLink) adminLink.style.display = 'none';
            }
            updateCartCount();
        });

        function logout() {
            sessionStorage.removeItem('dondad_currentUser');
            localStorage.removeItem('dondad_currentUser');
            location.reload();
        }

        function toggleMenu(event) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
            const navLinks = document.querySelector('.nav-links');
            const hamburger = document.querySelector('.hamburger');

            if (navLinks && hamburger) {
                navLinks.classList.toggle('active');
                hamburger.classList.toggle('active');
                console.log('Menu toggled - navLinks:', navLinks.classList.contains('active'));
            } else {
                console.error('Nav elements not found');
            }
        }

        function toggleUserMenu(e) {
            // Prevent the click from propagating to parent elements
            e.stopPropagation();

            // Find the user-menu element
            const userMenu = document.querySelector('.user-menu');
            const userDropdown = document.querySelector('.user-dropdown');

            console.log('toggleUserMenu clicked, userMenu:', userMenu);
            console.log('Has active class:', userMenu && userMenu.classList ? userMenu.classList.contains('active') :
                'no class');

            // Don't toggle if clicking inside the dropdown
            if (userDropdown && userDropdown.contains(e.target)) {
                return;
            }

            if (userMenu) {
                userMenu.classList.toggle('active');
                console.log('Toggled active, now has:', userMenu.classList.contains('active'));
            }
        }

        // Close dropdown and hamburger when clicking on the page
        document.addEventListener('click', function (e) {
            // Close user dropdown
            const userMenu = document.querySelector('.user-menu');
            const userDropdown = document.querySelector('.user-dropdown');
            if (userMenu && userDropdown) {
                if (!userMenu.contains(e.target) && !userDropdown.contains(e.target)) {
                    userMenu.classList.remove('active');
                }
            }

            // Close hamburger menu
            const hamburger = document.querySelector('.hamburger');
            const navLinks = document.querySelector('.nav-links');
            if (hamburger && navLinks) {
                if (!hamburger.contains(e.target) && !navLinks.contains(e.target)) {
                    hamburger.classList.remove('active');
                    navLinks.classList.remove('active');
                }
            }
        });

        // Product detail page logic - Fetch from API
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        let currentProduct = null;

        async function loadProduct() {
            const container = document.getElementById('product-container');

            try {
                const response = await fetch('/api/products/' + productId);
                if (response.ok) {
                    const product = await response.json();
                    currentProduct = product;
                    renderProduct(product);
                    loadRelatedProducts(product);
                } else {
                    container.innerHTML = `
                        <div class="error-state">
                            <div class="error-icon">🔍</div>
                            <h2>Product Not Found</h2>
                            <p>Sorry, the product you're looking for doesn't exist or has been removed.</p>
                            <a href="../shop/shop.html" class="btn">Back to Shop</a>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading product:', error);
                container.innerHTML = `
                    <div class="error-state">
                        <div class="error-icon">⚠️</div>
                        <h2>Error Loading Product</h2>
                        <p>Unable to connect to server. Please make sure the server is running.</p>
                        <button onclick="loadProduct()" class="btn">Try Again</button>
                    </div>
                `;
            }
        }

        function renderProduct(product) {
            const container = document.getElementById('product-container');
            const categoryDisplay = product.category.charAt(0).toUpperCase() + product.category.slice(1);
            const basePrice = product.price;

            // Generate variant selectors if product has variants
            let variantSelectorsHTML = '';
            let variantScript = '';

            if (product.hasVariants && product.variants) {
                const variants = product.variants;

                // Storage selector
                if (variants.storage && variants.storage.length > 0) {
                    variantSelectorsHTML += `
                        <div class="variant-selector">
                            <label>Storage:</label>
                            <div class="variant-options" id="storage-options">
                                ${variants.storage.map((opt, i) => `
                                    <button type="button" class="variant-btn" 
                                            data-type="storage" 
                                            data-option="${opt.option}"
                                            data-modifier="${opt.priceModifier}"
                                            onclick="selectVariant(this)">
                                        ${opt.option}${opt.priceModifier > 0 ? ' (+₦' + opt.priceModifier.toLocaleString() + ')' : ''}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }

                // RAM selector
                if (variants.ram && variants.ram.length > 0) {
                    variantSelectorsHTML += `
                        <div class="variant-selector">
                            <label>RAM:</label>
                            <div class="variant-options" id="ram-options">
                                ${variants.ram.map((opt, i) => `
                                    <button type="button" class="variant-btn" 
                                            data-type="ram" 
                                            data-option="${opt.option}"
                                            data-modifier="${opt.priceModifier}"
                                            onclick="selectVariant(this)">
                                        ${opt.option}${opt.priceModifier > 0 ? ' (+₦' + opt.priceModifier.toLocaleString() + ')' : ''}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }

                // Color selector
                if (variants.color && variants.color.length > 0) {
                    variantSelectorsHTML += `
                        <div class="variant-selector">
                            <label>Color:</label>
                            <div class="variant-options" id="color-options">
                                ${variants.color.map((opt, i) => `
                                    <button type="button" class="variant-btn" 
                                            data-type="color" 
                                            data-option="${opt.option}"
                                            data-modifier="${opt.priceModifier}"
                                            onclick="selectVariant(this)">
                                        ${opt.option}${opt.priceModifier > 0 ? ' (+₦' + opt.priceModifier.toLocaleString() + ')' : ''}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
            }

            container.innerHTML = `
                <div class="product-gallery">
                    <div class="main-image">
                        <img id="product-image" src="${product.image}" alt="${product.name}" onerror="this.src='../../logo.png'">
                        <div class="image-badge">${categoryDisplay}</div>
                    </div>
                </div>
                
                <div class="product-info">
                    <div class="product-header">
                        <span class="category-label">${categoryDisplay}</span>
                        <h1 id="product-name">${product.name}</h1>
                    </div>
                    
                    <div class="product-price-section">
                        <span class="price-label">Price</span>
                        <p class="price" id="product-price">₦${basePrice.toLocaleString()}</p>
                        <p class="price-breakdown" id="price-breakdown" style="display: none; font-size: 0.85rem; color: #9ca3af;"></p>
                    </div>
                    
                    ${variantSelectorsHTML}
                    
                    <div class="product-description">
                        <h3>Description</h3>
                        <p id="product-desc">${product.fullDesc || product.desc}</p>
                    </div>
                    
                    <div class="product-features">
                        <div class="feature">
                            <span class="feature-icon">✓</span>
                            <span>Original Brand Product</span>
                        </div>
                        <div class="feature">
                            <span class="feature-icon">✓</span>
                            <span>Quality Guaranteed</span>
                        </div>
                        <div class="feature">
                            <span class="feature-icon">✓</span>
                            <span>Secure Payment</span>
                        </div>
                        <div class="feature">
                            <span class="feature-icon">✓</span>
                            <span>Fast Delivery</span>
                        </div>
                    </div>
                    
                    <div class="product-actions">
                        <div class="quantity-selector">
                            <label>Quantity:</label>
                            <div class="qty-controls">
                                <button onclick="changeQty(-1)">−</button>
                                <input type="number" id="quantity" value="1" min="1" max="99">
                                <button onclick="changeQty(1)">+</button>
                            </div>
                        </div>
                        <button class="btn btn-primary" id="add-to-cart-btn">
                            <span class="btn-icon">🛒</span>
                            Add to Cart
                        </button>
                    </div>
                    
                    <div class="product-meta">
                        <div class="meta-item">
                            <span class="meta-label">Category:</span>
                            <span class="meta-value">${categoryDisplay}</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Product ID:</span>
                            <span class="meta-value">${product._id ? product._id.substring(0, 8) + '...' : 'N/A'}</span>
                        </div>
                    </div>
                </div>
            `;

            // Store product data for addToCart
            window.currentProductData = {
                _id: product._id || product.id,
                price: basePrice,
                hasVariants: product.hasVariants || false,
                variants: product.variants || {
                    storage: [],
                    ram: [],
                    color: []
                }
            };

            // Update page title
            document.title = product.name + ' - Pajay Gadgets';

            // Add to cart event listener
            document.getElementById('add-to-cart-btn').addEventListener('click', () => {
                const qty = parseInt(document.getElementById('quantity').value);
                addToCartWithVariants(qty);
            });
        }

        // Variant selection tracking
        let selectedVariants = {
            storage: '',
            ram: '',
            color: ''
        };

        function selectVariant(btn) {
            const type = btn.dataset.type;
            const option = btn.dataset.option;
            const modifier = parseFloat(btn.dataset.modifier) || 0;

            // Update selection
            selectedVariants[type] = option;

            // Update UI - remove active class from siblings, add to clicked
            const container = btn.parentElement;
            container.querySelectorAll('.variant-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Recalculate price
            updateDisplayPrice();
        }

        function updateDisplayPrice() {
            const product = window.currentProductData;
            if (!product) return;

            let totalModifier = 0;
            let breakdown = [];

            // Calculate modifiers from selected variants
            if (product.hasVariants && product.variants) {
                ['storage', 'ram', 'color'].forEach(type => {
                    const selected = selectedVariants[type];
                    if (selected && product.variants[type]) {
                        const variant = product.variants[type].find(v => v.option === selected);
                        if (variant && variant.priceModifier) {
                            // Replace base price with variant price instead of adding
                            if (totalModifier === 0) {
                                totalModifier = variant.priceModifier;
                                breakdown.push(`${type}: ₦${variant.priceModifier.toLocaleString()}`);
                            }
                        }
                    }
                });
            }

            const finalPrice = totalModifier > 0 ? totalModifier : product.price;
            document.getElementById('product-price').textContent = '₦' + finalPrice.toLocaleString();

            // Show breakdown if there are modifiers
            const breakdownEl = document.getElementById('price-breakdown');
            if (breakdown.length > 0) {
                breakdownEl.textContent = breakdown.join(' + ');
                breakdownEl.style.display = 'block';
            } else {
                breakdownEl.style.display = 'none';
            }
        }

        function addToCartWithVariants(qty) {
            const product = window.currentProductData;
            if (!product) return;

            // Check if user is logged in - check both sessionStorage and localStorage
            const currentUser = getCurrentUser();
            if (!currentUser) {
                alert('Please login to add items to cart');
                window.location.href = '../auth/login.html';
                return;
            }

            // Check if variants are required
            if (product.hasVariants) {
                const required = [];
                if (product.variants.storage && product.variants.storage.length > 0 && !selectedVariants.storage) {
                    required.push('Storage');
                }
                if (product.variants.ram && product.variants.ram.length > 0 && !selectedVariants.ram) {
                    required.push('RAM');
                }
                if (product.variants.color && product.variants.color.length > 0 && !selectedVariants.color) {
                    required.push('Color');
                }

                if (required.length > 0) {
                    alert('Please select: ' + required.join(', '));
                    return;
                }
            }

            const userId = currentUser._id || currentUser.id;

            // Build the cart item data
            const cartItem = {
                productId: product._id,
                qty: qty
            };

            // Add variant info if selected
            if (product.hasVariants) {
                cartItem.variants = {
                    storage: selectedVariants.storage || null,
                    ram: selectedVariants.ram || null,
                    color: selectedVariants.color || null
                };
            }

            fetch('/api/cart/' + userId, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                credentials: 'include',
                body: JSON.stringify(cartItem)
            })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        alert('Added to cart!');
                        updateCartCount();
                    } else {
                        // Fallback to local storage
                        addToCartLocal(product._id, qty);
                    }
                })
                .catch(err => {
                    console.error('Add to cart error:', err);
                    addToCartLocal(product._id, qty);
                });
        }

        function addToCartLocal(productId, qty) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const existing = cart.find(item => item._id === productId);
            if (existing) {
                existing.qty += qty;
            } else {
                cart.push({ _id: productId, qty: qty });
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            alert('Added to cart! (offline mode)');
            updateCartCount();
        }

        function changeQty(delta) {
            const input = document.getElementById('quantity');
            let val = parseInt(input.value) + delta;
            if (val < 1) val = 1;
            if (val > 99) val = 99;
            input.value = val;
        }

        function handleBackToShop(e) {
            // Check if there's a referrer from the same site
            const referrer = document.referrer;
            if (referrer && referrer.includes(window.location.host)) {
                // Allow default navigation
                return true;
            }
            // Default to shop page
            window.location.href = '../shop/shop.html';
            return false;
        }

        // Load related products
        async function loadRelatedProducts(product) {
            try {
                const response = await fetch('/api/products?category=' + product.category + '&limit=4');
                const data = await response.json();
                const products = data.products || data;
                
                // Filter out current product
                const related = products.filter(p => p._id !== product._id).slice(0, 4);
                
                const grid = document.getElementById('related-grid');
                if (related.length > 0) {
                    grid.innerHTML = related.map(p => `
                        <div class="related-card">
                            <a href="product.html?id=${p._id}">
                                <img src="${p.image}" alt="${p.name}" onerror="this.src='../../logo.png'">
                            </a>
                            <div class="related-info">
                                <a href="product.html?id=${p._id}">
                                    <h3>${p.name}</h3>
                                </a>
                                <p class="price">₦${p.price.toLocaleString()}</p>
                                <a href="product.html?id=${p._id}" class="btn">View</a>
                            </div>
                        </div>
                    `).join('');
                } else {
                    grid.innerHTML = '<p style="text-align:center; padding: 2rem;">No related products found</p>';
                }
            } catch (error) {
                console.error('Error loading related products:', error);
            }
        }

        // Initialize
        if (productId) {
            loadProduct();
        } else {
            document.getElementById('product-container').innerHTML = `
                <div class="error-state">
                    <div class="error-icon">🔍</div>
                    <h2>No Product Selected</h2>
                    <p>Please select a product from the shop.</p>
                    <a href="../shop/shop.html" class="btn">Browse Products</a>
                </div>
            `;
        }
    </script>
</body>

</html>
