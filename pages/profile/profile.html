<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Pajay Gadgets</title>
    <link rel="stylesheet" href="./profile.css">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="../index/index.html" class="logo">Pajay Gadgets</a>
            <ul class="nav-links">
                <li><a href="../index/index.html">Home</a></li>
                <li><a href="../shop/shop.html">Shop</a></li>
            </ul>
            <div class="nav-right">
                <div id="user-menu">
                    <div class="user-menu" onclick="toggleUserMenu(event)">
                        <div class="user-avatar" id="user-avatar"></div>
                        <div class="user-info">
                            <span class="user-name" id="user-name"></span>
                        </div>
                        <div class="user-dropdown">
                            <a href="profile.html"><span class="dropdown-icon">👤</span> My Profile</a>
                            <a href="../cart/cart.html"><span class="dropdown-icon">🛒</span> My Cart</a>
                            <a href="../wishlist/wishlist.html"><span class="dropdown-icon">❤️</span> Wishlist</a>
                            <a href="#" onclick="logout(); return false;" class="logout-btn"><span class="dropdown-icon">🚪</span> Logout</a>
                        </div>
                    </div>
                </div>
                <a href="../cart/cart.html" class="cart-btn">Cart (<span id="cart-count">0</span>)</a>
            </div>
        </nav>
    </header>

    <main class="auth-page">
        <div class="auth-container">
            <div class="auth-card" style="max-width: 600px;">
                <div class="auth-header">
                    <div class="auth-icon">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <h1>My Profile</h1>
                    <p>Manage your account information</p>
                </div>

                <form id="profile-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" id="phone">
                    </div>
                    <button type="submit" class="btn btn-primary">Update Profile</button>
                </form>

                <div style="margin-top: 2rem;">
                    <h3>My Orders</h3>
                    <a href="../order-tracking/order-tracking.html" class="btn" style="margin-top: 0.5rem;">Track Orders</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="../contact/contact.html">Contact</a>
            <a href="../privacy/privacy.html">Privacy Policy</a>
            <a href="../terms/terms.html">Terms</a>
            <a href="../returns/returns.html">Returns</a>
        </div>
        <p>&copy; 2024 Pajay Gadgets. All rights reserved.</p>
    </footer>

    <script>
        function getCurrentUser() {
            try {
                const sessionUser = JSON.parse(sessionStorage.getItem('dondad_currentUser') || 'null');
                if (sessionUser) return sessionUser;
                return JSON.parse(localStorage.getItem('dondad_currentUser') || 'null');
            } catch {
                return null;
            }
        }

        const user = getCurrentUser();
        if (!user) {
            window.location.href = '../auth/login.html';
        }

        document.getElementById('name').value = user.name || '';
        document.getElementById('email').value = user.email || '';
        document.getElementById('phone').value = user.phone || '';
        
        const initials = (user.name || 'U').split(' ').map(n => n[0]).join('').substring(0, 2);
        document.getElementById('user-avatar').textContent = initials || 'U';
        document.getElementById('user-name').textContent = user.name || 'User';

        function logout() {
            sessionStorage.removeItem('dondad_currentUser');
            localStorage.removeItem('dondad_currentUser');
            window.location.href = '../index/index.html';
        }

        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            alert('Profile update functionality would connect to API here');
        });
    </script>
    <script src="/script.js?v=20260312" defer></script>
</body>
</html>
