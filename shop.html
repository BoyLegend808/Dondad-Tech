<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Pajay Gadgets</title>
    <meta name="description" content="Browse phones, laptops, tablets, and accessories at Pajay Gadgets.">
    <meta name="keywords" content="shop gadgets, buy phones, laptops, accessories">
    <meta property="og:title" content="Shop - Pajay Gadgets">
    <meta property="og:description" content="Explore gadgets by category and find your next device.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="images/logo.png">
    <link rel="canonical" href="shop.html">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/shop.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/products.js"></script>
    <script src="js/script.js?v=20260312-3" defer></script>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>

<body class="shop-page">
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">Pajay Gadgets</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html" class="active">Shop</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li id="admin-nav-link" style="display:none;"><a href="admin.html">Admin</a></li>
            </ul>
            <div class="nav-right">
                <div id="auth-links" class="auth-links">
                    <a href="login.html" class="auth-btn">Login</a>
                    <a href="register.html" class="auth-btn register">Register</a>
                </div>
                <div id="user-menu" style="display:none;">
                    <div class="user-menu" onclick="window.toggleUserMenu && window.toggleUserMenu(event)">
                        <div class="user-avatar" id="user-avatar"></div>
                        <div class="user-info">
                            <span class="user-greeting">Welcome back</span>
                            <span class="user-name" id="user-name"></span>
                        </div>
                        <div class="user-dropdown">
                            <a href="profile.html">👤 My Profile</a>
                            <a href="cart.html">🛒 My Cart</a>
                            <a href="#" id="logout-btn" class="logout-btn">🚪 Logout</a>
                        </div>
                    </div>
                    <a href="cart.html" class="cart-btn">🛒 Cart (<span id="cart-count">0</span>)</a>
                </div>
                <button class="hamburger" aria-label="Toggle menu" onclick="window.toggleMenu && window.toggleMenu(event)">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </nav>
    </header>

    <main class="shop-shell">
        <section class="shop-controls-panel">
            <div class="search-wrap">
                <input type="text" id="search" placeholder="Search products..." oninput="searchProducts(this.value)">
            </div>
            <div class="filters">
                <button class="filter-btn active" data-category="all" onclick="filterProducts('all', this)">All</button>
                <button class="filter-btn" data-category="phones" onclick="filterProducts('phones', this)">Phones</button>
                <button class="filter-btn" data-category="laptops" onclick="filterProducts('laptops', this)">Laptops</button>
                <button class="filter-btn" data-category="tablets" onclick="filterProducts('tablets', this)">Tablets</button>
                <button class="filter-btn" data-category="accessories" onclick="filterProducts('accessories', this)">Accessories</button>
            </div>
        </section>

        <section class="shop-products-panel">
            <div class="products-head">
                <h2>Products</h2>
                <a href="index.html" class="products-head-link">Back Home</a>
            </div>
            <div class="product-grid" id="product-grid">
                <p style="text-align:center; padding: 2rem;">Loading products...</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-links">
            <a href="contact.html">Contact</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="terms.html">Terms</a>
            <a href="returns.html">Returns</a>
        </div>
        <p>&copy; 2024 Pajay Gadgets. All rights reserved.</p>
    </footer>

    <script src="js/auth.js"></script>
</body>
</html>
