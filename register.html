<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Pajay Gadgets</title>
    <meta name="description" content="Create your Pajay Gadgets account to shop faster and track orders.">
    <meta property="og:title" content="Register - Pajay Gadgets">
    <meta property="og:description" content="Create a customer account in minutes.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="logo.png">
    <link rel="canonical" href="register.html">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">Pajay Gadgets</a>
            <div class="nav-right">
                <a href="login.html" class="auth-btn">Login</a>
                <button class="hamburger" aria-label="Toggle menu" onclick="toggleMenu(event)">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </nav>
    </header>

    <main class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-icon">
                        <i class="fas fa-user-plus"></i>
                    </div>
                    <h1>Create Account</h1>
                    <p>Join Pajay Gadgets today</p>
                </div>
                
                <div id="register-form">
                    <div class="form-group">
                        <label for="name">
                            <i class="fas fa-user"></i> Full Name
                        </label>
                        <div class="input-wrapper">
                            <input type="text" id="name" placeholder="Enter your name">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i> Email
                        </label>
                        <div class="input-wrapper">
                            <input type="email" id="email" placeholder="Enter your email">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">
                            <i class="fas fa-phone"></i> Phone
                        </label>
                        <div class="input-wrapper">
                            <input type="tel" id="phone" placeholder="Enter your phone number">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <div class="input-wrapper">
                            <input type="password" id="password" placeholder="Create password">
                            <button type="button" class="toggle-password" data-target="password" aria-label="Toggle password visibility">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm">
                            <i class="fas fa-lock"></i> Confirm Password
                        </label>
                        <div class="input-wrapper">
                            <input type="password" id="confirm" placeholder="Confirm password">
                            <button type="button" class="toggle-password" data-target="confirm" aria-label="Toggle confirm password visibility">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <p id="error" class="error-message"></p>
                    
                    <button type="button" class="btn btn-primary btn-block" onclick="doRegister()">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </div>
                
                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html">Login</a></p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="contact.html">Contact</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="terms.html">Terms</a>
            <a href="returns.html">Returns</a>
        </div>
        <p>&copy; 2024 Pajay Gadgets. All rights reserved.</p>
    </footer>

    <script src="/script.js?v=20260312-2" defer></script>
    <script>
        function toggleMenu(event) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
            const hamburger = document.querySelector('.hamburger');
            const navLinks = document.getElementById('navLinks');
            if (hamburger && navLinks) {
                hamburger.classList.toggle('active');
                navLinks.classList.toggle('active');
                console.log('Menu toggled:', navLinks.classList.contains('active'));
            }
        }
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Register page loaded');
            var hamburger = document.querySelector('.hamburger');
            if (hamburger) {
                hamburger.onclick = toggleMenu;
                console.log('Hamburger handler attached');
            }
        });
        
        function doRegister() {
            console.log('doRegister called');
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            const error = document.getElementById('error');
            const btn = document.querySelector('#register-form button');

            if (!name || !email || !password || !confirm) {
                if (error) {
                    error.textContent = 'Please fill in all required fields';
                    error.style.display = 'block';
                }
                return;
            }

            if (password !== confirm) {
                if (error) {
                    error.textContent = 'Passwords do not match';
                    error.style.display = 'block';
                }
                return;
            }

            if (password.length < 6) {
                if (error) {
                    error.textContent = 'Password must be at least 6 characters';
                    error.style.display = 'block';
                }
                return;
            }

            console.log('Attempting registration...');
            if (error) error.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';

            fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ name, email, phone, password })
            })
            .then(function(response) { return response.json(); })
            .then(function(data) {
                console.log('Registration response:', data);
                if (data.success) {
                    console.log('Registration successful');
                    if (error) {
                        error.textContent = 'Registration successful! Please login.';
                        error.style.display = 'block';
                        error.style.color = 'green';
                    }
                    setTimeout(function() {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    throw new Error(data.error || 'Registration failed');
                }
            })
            .catch(function(err) {
                console.error('Registration error:', err);
                if (error) {
                    error.textContent = err.message || 'Registration failed. Please try again.';
                    error.style.display = 'block';
                }
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
                }
            });
        }
    </script>
</body>
</html>
