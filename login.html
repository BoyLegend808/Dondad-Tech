<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pajay Gadgets</title>
    <meta name="description" content="Login to your Pajay Gadgets account to manage cart, orders, and profile.">
    <meta property="og:title" content="Login - Pajay Gadgets">
    <meta property="og:description" content="Access your account securely.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="logo.png">
    <link rel="canonical" href="login.html">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="script.js"></script>
</head>
<body>
    <script>alert('JavaScript is running!');</script>
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">Pajay Gadgets</a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="nav-right">
                <a href="register.html" class="auth-btn register">Register</a>
                <button class="hamburger" aria-label="Toggle menu" onclick="toggleMenu(event)">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </nav>
    </header>

    <main class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-icon">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <h1>Welcome Back</h1>
                    <p>Login to your account</p>
                </div>

                <div id="login-form">
                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> Email</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" placeholder="Enter your email">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password"><i class="fas fa-lock"></i> Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" placeholder="Enter your password">
                            <button type="button" class="toggle-password" onclick="togglePassword()" aria-label="Toggle password visibility">
                                <i class="fas fa-eye" id="eye-icon"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="remember">
                            <span>Remember me</span>
                        </label>
                        <a href="reset-password.html" class="forgot-password">Forgot Password?</a>
                    </div>

                    <p id="error" class="error-message"></p>

                    <button type="button" class="btn btn-primary btn-block" id="login-btn" onclick="doLogin()">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </div>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="register.html">Create one</a></p>
                    <p style="margin-top:10px;"><a href="reset-password.html" style="color:#999; font-size:13px;">Forgot Password?</a></p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="contact.html">Contact</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="terms.html">Terms</a>
            <a href="returns.html">Returns</a>
        </div>
        <p>&copy; 2024 Pajay Gadgets. All rights reserved.</p>
    </footer>

    <script>
        function getCurrentUser() {
            try {
                const sessionUser = JSON.parse(sessionStorage.getItem('dondad_currentUser') || 'null');
                if (sessionUser) return sessionUser;
                return JSON.parse(localStorage.getItem('dondad_currentUser') || 'null');
            } catch {
                return null;
            }
        }

        function normalizeEmail(email) {
            return String(email || '').trim().toLowerCase();
        }

        function persistLoginUser(user, remember) {
            sessionStorage.setItem('dondad_currentUser', JSON.stringify(user));
            if (remember) {
                localStorage.setItem('dondad_currentUser', JSON.stringify(user));
            } else {
                localStorage.removeItem('dondad_currentUser');
            }
        }

        function toggleMenu(event) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
            const navLinks = document.getElementById('navLinks');
            const hamburger = document.querySelector('.hamburger');
            if (navLinks) navLinks.classList.toggle('active');
            if (hamburger) hamburger.classList.toggle('active');
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }
        
        // Main login function
        function doLogin() {
            alert('doLogin called!');
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const error = document.getElementById('error');
            const btn = document.getElementById('login-btn');

            if (!email || !password) {
                alert('Please enter email and password');
                error.textContent = 'Please enter email and password';
                error.style.display = 'block';
                return;
            }
            
            alert('Attempting login...');
            error.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
            .then(function(response) { return response.json(); })
            .then(function(data) {
                alert('Response: ' + JSON.stringify(data));
                if (data.success) {
                    var user = data.user;
                    if (remember) {
                        localStorage.setItem('dondad_currentUser', JSON.stringify(user));
                    } else {
                        sessionStorage.setItem('dondad_currentUser', JSON.stringify(user));
                    }
                    alert('Login success!');
                    window.location.href = user.role === 'admin' ? 'admin.html' : 'index.html';
                } else {
                    throw new Error(data.error || 'Login failed');
                }
            })
            .catch(function(err) {
                alert('Error: ' + err.message);
                error.textContent = err.message || 'Login failed. Please try again.';
                error.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            });
        }

        async function tryApiLogin(email, password) {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ email, password })
            });

            const contentType = (response.headers.get('content-type') || '').toLowerCase();
            const data = contentType.includes('application/json') ? await response.json() : null;

            if (response.ok && data && data.success && data.user) {
                return data.user;
            }

            if (data && data.error) {
                throw new Error(data.error);
            }

            throw new Error('Invalid credentials');
        }
        
        // Global toggle menu function for hamburger
        window.toggleMenu = function(e) {
            if (e) {
                e.preventDefault();
                e.stopPropagation();
            }
            const hamburger = document.querySelector('.hamburger');
            const navLinks = document.getElementById('navLinks');
            if (hamburger && navLinks) {
                hamburger.classList.toggle('active');
                navLinks.classList.toggle('active');
            }
        };
        
        // Login click handler - called from button onclick
        window.handleLoginClick = async function() {
            // Debug: Show we're in the function
            console.log('handleLoginClick called');
            alert('Login button clicked');
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const error = document.getElementById('error');
            const btn = document.getElementById('login-btn');

            if (!email || !password) {
                alert('Please enter email and password');
                error.textContent = 'Please enter email and password';
                error.style.display = 'block';
                return;
            }
            
            alert('Attempting login to API...');
            error.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                alert('API response received: ' + response.status);
                const data = await response.json();
                alert('Data: ' + JSON.stringify(data));
                
                if (data.success) {
                    const user = data.user;
                    if (remember) {
                        localStorage.setItem('dondad_currentUser', JSON.stringify(user));
                    } else {
                        sessionStorage.setItem('dondad_currentUser', JSON.stringify(user));
                    }
                    alert('Login successful! Redirecting...');
                    window.location.href = user.role === 'admin' ? 'admin.html' : 'index.html';
                } else {
                    throw new Error(data.error || 'Login failed');
                }
            } catch (err) {
                alert('Error: ' + err.message);
                error.textContent = err.message || 'Login failed. Please try again.';
                error.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        };
    </script>
</body>
</html>
