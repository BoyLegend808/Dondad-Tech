<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pajay Gadgets</title>
    <meta name="description" content="Login to your Pajay Gadgets account to manage cart, orders, and profile.">
    <meta property="og:title" content="Login - Pajay Gadgets">
    <meta property="og:description" content="Access your account securely.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="logo.png">
    <link rel="canonical" href="login.html">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">Pajay Gadgets</a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="nav-right">
                <a href="register.html" class="auth-btn register">Register</a>
                <button class="hamburger" aria-label="Toggle menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </nav>
    </header>

    <main class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-icon">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <h1>Welcome Back</h1>
                    <p>Login to your account</p>
                </div>

                <form id="login-form" onsubmit="return handleLoginSubmit(event)">
                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> Email</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" placeholder="Enter your email" autocomplete="email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password"><i class="fas fa-lock"></i> Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
                            <button type="button" class="toggle-password" data-target="password" aria-label="Toggle password visibility" onclick="var p=document.getElementById('password'); var i=this.querySelector('i'); if(p.type==='password'){p.type='text';i.classList.remove('fa-eye');i.classList.add('fa-eye-slash');}else{p.type='password';i.classList.remove('fa-eye-slash');i.classList.add('fa-eye');}">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="remember">
                            <span>Remember me</span>
                        </label>
                        <a href="reset-password.html" class="forgot-password">Forgot Password?</a>
                    </div>

                    <p id="error" class="error-message"></p>

                    <button type="submit" class="btn btn-primary btn-block" id="login-btn">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="register.html">Create one</a></p>
                    <p style="margin-top:10px;"><a href="reset-password.html" style="color:#999; font-size:13px;">Forgot Password?</a></p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="contact.html">Contact</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="terms.html">Terms</a>
            <a href="returns.html">Returns</a>
        </div>
        <p>&copy; 2024 Pajay Gadgets. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
    // MVP Fix: Inline login handler that works on all devices
    function handleLoginSubmit(e) {
        e.preventDefault();
        e.stopPropagation();
        
        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;
        var errorEl = document.getElementById('error');
        var btn = document.getElementById('login-btn');
        
        console.log('Login attempt:', email);
        
        if (!email || !password) {
            if (errorEl) {
                errorEl.textContent = 'Please enter email and password';
                errorEl.style.display = 'block';
            }
            return false;
        }
        
        if (btn) {
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
        }
        
        fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, password: password })
        })
        .then(function(response) { 
            console.log('Response status:', response.status); 
            return response.json(); 
        })
        .then(function(data) {
            console.log('Response data:', data);
            if (data.success) {
                console.log('Login successful');
                // Store user
                try {
                    sessionStorage.setItem('dondad_currentUser', JSON.stringify(data.user));
                } catch(err) {
                    console.error('Storage error:', err);
                }
                if (data.user.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                if (errorEl) {
                    errorEl.textContent = data.error || 'Invalid email or password';
                    errorEl.style.display = 'block';
                }
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                }
            }
        })
        .catch(function(error) {
            console.error('Login error:', error);
            if (errorEl) {
                errorEl.textContent = 'Connection error. Please check your internet and try again.';
                errorEl.style.display = 'block';
            }
            if (btn) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        });
        
        return false;
    }
    
    // Also handle hamburger menu click inline
    document.addEventListener('DOMContentLoaded', function() {
        var hamburger = document.querySelector('.hamburger');
        if (hamburger) {
            hamburger.addEventListener('click', function(e) {
                e.preventDefault();
                var navLinks = document.getElementById('navLinks');
                if (navLinks) navLinks.classList.toggle('active');
                hamburger.classList.toggle('active');
            });
        }
    });
    </script>
</body>
</html>
