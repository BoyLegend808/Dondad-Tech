[build]
  command = "npm run build"
  publish = "."
  functions = "."

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/server.js/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/server.js"
  status = 200
  force = true